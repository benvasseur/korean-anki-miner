name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run zip
      # Always expose the zip as a run artifact, so a manual dispatch (no tag)
      # still produces a downloadable build.
      - uses: actions/upload-artifact@v4
        with:
          name: korean-anki-miner-chrome
          path: .output/*-chrome.zip
      # On a version tag, publish a GitHub Release with the zip attached.
      - if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: .output/*-chrome.zip
          generate_release_notes: true
